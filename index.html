<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyCampus Cafe - Order System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .menu-card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 5px; }
        button { margin-right: 8px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
<div id="app">
    <h1>☕ MyCampus Cafe Menu</h1>

    <!-- Login Section -->
    <div v-if="!isLoggedIn">
        <h2>Staff Login</h2>
        <form @submit.prevent="loginStaff">
            <input v-model="login.username" placeholder="Username" required />
            <input v-model="login.password" type="password" placeholder="Password" required />
            <button type="submit">Login</button>
        </form>
        <p v-if="message" :class="message.includes('successful') ? 'success' : 'error'">{{ message }}</p>
        <hr />
    </div>

    <!-- Staff Management -->
    <div v-if="isLoggedIn">
        <p>✅ Logged in as staff. You can manage menu items.</p>
        <button @click="logout">Logout</button>
        <hr />

        <h2>Add New Menu Item</h2>
        <form @submit.prevent="addMenu">
            <input v-model="newMenu.menu_name" placeholder="Menu Name" required /><br /><br />
            <input v-model="newMenu.category" placeholder="Category" required /><br /><br />
            <input v-model="newMenu.price" type="number" step="0.01" placeholder="Price" required /><br /><br />
            <select v-model="newMenu.availability">
                <option>Available</option>
                <option>Unavailable</option>
            </select><br /><br />
            <button type="submit">➕ Add Menu</button>
        </form>
        <hr />
    </div>

    <!-- Menu Display -->
    <h2>Current Menu</h2>
    <div v-for="item in menuItems" :key="item.menu_id" class="menu-card">
        <h3>{{ item.menu_name }}</h3>
        <p>Category: {{ item.category }}</p>
        <p>Price: RM {{ parseFloat(item.price).toFixed(2) }}</p>
        <p>Status: {{ item.availability }}</p>
        <button v-if="isLoggedIn" @click="updateMenu(item)">✏️ Update</button>
        <button v-if="isLoggedIn" @click="deleteMenu(item.menu_id)">🗑️ Delete</button>
    </div>

    <p v-if="message" :class="message.includes('successful') ? 'success' : 'error'">{{ message }}</p>
</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
